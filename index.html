<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WC 2026 — Predictions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,200;0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page">

  <header class="topnav">
    <span class="logo">WC<span class="dot">.</span>2026</span>
    <nav>
      <button class="tab-btn active" data-tab="leaderboard">Leaderboard</button>
      <button class="tab-btn" data-tab="matches">Matches</button>
      <button class="tab-btn" data-tab="bonus">Bonus</button>
    </nav>
  </header>

  <div class="masthead">
    <div class="left">
      <div class="crumb">Groups G – L<span class="sep">/</span>USA · Canada · Mexico<span class="sep">/</span>2026</div>
      <h1>The <em>group</em><br>stage.</h1>
    </div>
    <div class="meta" id="meta-stats">
      — players<br>
      — matches<br>
      +1 result · +3 exact
    </div>
  </div>

  <div id="filter-bar" class="filter-bar"></div>

  <main>
    <div id="leaderboard" class="tab-pane active"></div>
    <div id="matches"     class="tab-pane"></div>
    <div id="bonus"       class="tab-pane"></div>
  </main>

</div>
<script src="js/app.js"></script>
</body>
</html>
